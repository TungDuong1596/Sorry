<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi người quan trọng nhất</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fffafa; /* Trắng hồng nhạt */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        h1 { color: #ff6b6b; margin-bottom: 20px; text-shadow: 1px 1px 2px #eee; }
        .buttons { position: relative; width: 300px; height: 100px; }
        button {
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #yes { background-color: #ff6b6b; color: white; position: absolute; left: 0; }
        #no { background-color: #a0a0a0; color: white; position: absolute; right: 0; z-index: 999; }
        #success-msg { display: none; color: #ff4757; font-size: 24px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h1 id="question">Hòa Tùng Dương sai rồi, em hết giận anh nhé? 🥺</h1>
    
    <div class="buttons" id="btn-group">
        <button id="yes">Đồng ý</button>
        <button id="no">Không!</button>
    </div>

    <div id="success-msg">Cảm ơn em đã tha lỗi! Anh hứa sẽ không để bug này lặp lại ❤️</div>

    <script>
        const noBtn = document.getElementById('no');
        const yesBtn = document.getElementById('yes');
        const question = document.getElementById('question');
        const successMsg = document.getElementById('success-msg');
        const btnGroup = document.getElementById('btn-group');

        // Hiệu ứng nút "Không" bỏ chạy
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        });

        // Khi nhấn "Đồng ý"
        yesBtn.addEventListener('click', () => {
            question.style.display = 'none';
            btnGroup.style.display = 'none';
            noBtn.style.display = 'none';
            successMsg.style.display = 'block';
            document.body.style.backgroundColor = '#ffeef0';
        });
    </script>
</body>
</html>
